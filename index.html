<!DOCTYPE html>
<html>
<head>
  <title>Wound Monitoring Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  Smart Wound Monitoring System
</header>

<div class="container">
  <div class="card">
    <h2>Temperature</h2>
    <div class="value" id="tempValue">--</div>
    <div class="state" id="tempState">--</div>
  </div>
  <div class="card">
    <h2>Moisture</h2>
    <div class="value" id="moistureValue">--</div>
    <div class="state" id="moistureState">--</div>
  </div>
  <div class="card">
    <h2>Pressure (FSR)</h2>
    <div class="value" id="fsrValue">--</div>
    <div class="state" id="fsrState">--</div>
  </div>
</div>

<div class="overall">
  Overall System State: <span id="overallState">--</span>
</div>

<script src="script.js"></script>
</body>
</html>
